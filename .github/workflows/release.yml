name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to validate before release publication
        required: true
        type: string

permissions:
  contents: read

jobs:
  release:
    name: Release preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Bun
        if: hashFiles('bun.lock') != ''
        uses: oven-sh/setup-bun@v2

      - name: Run release readiness gate
        run: ./eng/release-check.sh "${{ inputs.version }}"

      - name: Publishing status
        run: echo "Release publication is manual and must occur after release readiness succeeds."
