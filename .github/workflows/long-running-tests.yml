name: Long-running Tests

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  long-running-tests:
    name: Long-running tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Bun
        if: hashFiles('src/BlazorJsonVisualizer.Runtime/bun.lock') != ''
        uses: oven-sh/setup-bun@v2

      - name: Run long-running tests
        run: ./eng/long-running-tests.sh
