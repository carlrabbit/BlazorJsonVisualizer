name: Public Docs

on:
  push:
    branches: [main]
    paths:
      - README.md
      - public-docs/**
      - docs/PUBLIC-DOCS.md
      - docs/WORKFLOWS.md
      - docs/workflows/public-docs.md
      - docs/engineering/public-documentation.md
  pull_request:
    branches: [main]
    paths:
      - README.md
      - public-docs/**
      - docs/PUBLIC-DOCS.md
      - docs/WORKFLOWS.md
      - docs/workflows/public-docs.md
      - docs/engineering/public-documentation.md
  workflow_dispatch:

permissions:
  contents: read

jobs:
  public-docs:
    name: Public docs validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run public docs checks
        run: ./eng/public-docs.sh
